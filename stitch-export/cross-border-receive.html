<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-base min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="docked full-width top-0 bg-background flex justify-between items-center w-full px-margin-mobile h-16 md:hidden">
<div class="flex items-center gap-sm">
<button class="text-on-surface-variant hover:opacity-80 transition-opacity p-2 -ml-2">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<span class="font-display-lg-mobile text-display-lg-mobile text-secondary">Celerity</span>
</div>
</header>
<header class="hidden md:flex flex justify-between items-center w-full px-margin-desktop h-16 bg-background">
<div class="flex items-center gap-sm">
<button class="text-on-surface-variant hover:opacity-80 transition-opacity p-2 -ml-2">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<span class="font-display-lg-mobile text-display-lg-mobile text-secondary">Celerity</span>
</div>
</header>
<!-- Main Content -->
<main class="flex-grow flex flex-col items-center justify-center p-margin-mobile md:p-margin-desktop pb-32">
<div class="w-full max-w-md w-full bg-surface rounded-xl shadow-[0px_4px_12px_rgba(9,44,76,0.08)] border border-outline-variant p-md md:p-lg flex flex-col gap-lg relative overflow-hidden">
<!-- Notification Header -->
<div class="text-center flex flex-col items-center gap-sm">
<div class="w-16 h-16 rounded-full bg-secondary-container text-on-secondary-container flex items-center justify-center mb-sm">
<span class="material-symbols-outlined text-4xl" data-icon="mark_email_unread" style="font-variation-settings: 'FILL' 1;">mark_email_unread</span>
</div>
<h1 class="font-headline-md text-headline-md text-primary">You received a remittance!</h1>
</div>
<!-- Sender Info -->
<div class="bg-surface-container-low rounded-lg p-md border border-outline-variant flex items-center gap-md">
<div class="w-12 h-12 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center font-body-bold">
                    JC
                </div>
<div>
<div class="font-body-base text-on-surface-variant">From</div>
<div class="font-body-bold text-on-surface">Juan dela Cruz <span class="text-on-surface-variant font-body-base">(USA)</span></div>
</div>
</div>
<!-- Breakdown -->
<div class="flex flex-col gap-sm border-t border-b border-outline-variant py-md">
<div class="flex justify-between items-center">
<span class="font-body-base text-on-surface-variant">Sent Amount</span>
<span class="font-mono-data text-mono-data text-on-surface">$200.00 USD</span>
</div>
<div class="flex justify-between items-center">
<span class="font-body-base text-on-surface-variant flex items-center gap-xs">
                        FX Rate
                        <span class="material-symbols-outlined text-[16px]" data-icon="info">info</span>
</span>
<span class="font-mono-data text-mono-data text-on-surface">$1 = ₱56.10</span>
</div>
</div>
<!-- Total Landing -->
<div class="text-center">
<div class="font-body-base text-on-surface-variant mb-xs">Amount landing</div>
<div class="font-mono-hero-mobile text-mono-hero-mobile text-primary">
<span class="text-[32px] align-top">₱</span>11,220<span class="text-[32px]">.00</span>
</div>
</div>
<!-- Primary Action -->
<button class="w-full h-12 bg-secondary text-on-secondary font-body-bold rounded-lg flex items-center justify-center gap-sm hover:opacity-90 transition-opacity active:scale-[0.98]">
<span class="material-symbols-outlined" data-icon="add_circle">add_circle</span>
                Add to Balance
            </button>
<!-- Microcopy -->
<div class="text-center flex flex-col gap-xs mt-sm">
<p class="font-label-caps text-label-caps text-on-surface-variant uppercase">Transparent rates, zero hidden fees.</p>
<div class="flex items-center justify-center gap-xs text-on-surface-variant">
<span class="material-symbols-outlined text-[16px]" data-icon="bolt">bolt</span>
<p class="text-[12px]">Powered by Stellar global network</p>
</div>
</div>
<!-- Decorative Gradient for "Trustworthy Modernism" -->
<div class="absolute -top-24 -right-24 w-48 h-48 bg-primary-fixed rounded-full mix-blend-multiply filter blur-3xl opacity-50 pointer-events-none"></div>
<div class="absolute -bottom-24 -left-24 w-48 h-48 bg-secondary-fixed rounded-full mix-blend-multiply filter blur-3xl opacity-30 pointer-events-none"></div>
</div>
</main>
