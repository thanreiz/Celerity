<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Celerity — Stitch design gallery</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  :root {
    --bg: #020617; --card: #0f172a; --line: #263349;
    --text: #f8fafc; --dim: #94a3b8; --accent: #22c55e;
  }
  body { background: var(--bg); color: var(--text); font: 16px/1.5 "Fira Sans", system-ui, sans-serif; padding: 32px 24px 80px; }
  h1 { font-family: "Fira Code", ui-monospace, monospace; font-size: 28px; letter-spacing: -1px; }
  h1 span { color: var(--accent); }
  p.sub { color: var(--dim); margin: 6px 0 28px; font-size: 14px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; max-width: 1400px; margin: 0 auto; }
  a.card { display: block; background: var(--card); border: 1px solid var(--line); border-radius: 14px; overflow: hidden; text-decoration: none; color: var(--text); transition: border-color 200ms ease; }
  a.card:hover, a.card:focus-visible { border-color: var(--accent); outline: none; }
  a.card img { width: 100%; aspect-ratio: 39/112.4; object-fit: cover; object-position: top; display: block; background: #fff; }
  a.card.desktop img { aspect-ratio: 16/10; }
  .label { padding: 12px 14px; font-family: "Fira Code", ui-monospace, monospace; font-size: 13px; display: flex; justify-content: space-between; gap: 8px; }
  .label em { color: var(--dim); font-style: normal; font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px; }
  header { max-width: 1400px; margin: 0 auto; }
</style>
</head>
<body>
<header>
  <h1><span>Celerity</span> — Stitch design gallery</h1>
  <p class="sub">18 screens from "Celerity Design System Evolution" (stitch.withgoogle.com) · exported by tools/stitch-pull.py · click any card for the live HTML</p>
</header>
<div class="grid" id="grid"></div>
<script>
fetch("index.json").then(r => r.json()).then(items => {
  const grid = document.getElementById("grid");
  for (const it of items) {
    const [html, png] = it.files;
    const a = document.createElement("a");
    a.className = "card" + (it.device === "DESKTOP" ? " desktop" : "");
    a.href = html;
    a.innerHTML = `<img src="${png}" alt="${it.title} screenshot" loading="lazy">
      <div class="label"><strong>${it.title}</strong><em>${(it.device || "").toLowerCase()}</em></div>`;
    grid.appendChild(a);
  }
});
</script>
</body>
</html>
