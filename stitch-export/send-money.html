<script>
        let currentAmount = "0";
        const display = document.getElementById('amount-display');

        function formatAmount(val) {
            // Very basic formatter for demo purposes
            if(val === "0" || val === "") return "0.00";
            
            // If it ends with decimal, keep it for typing
            if(val.endsWith('.')) return val;
            
            // If it has decimal, format appropriately
            if(val.includes('.')) {
                const parts = val.split('.');
                // Add commas to integer part
                parts[0] = parseInt(parts[0], 10).toLocaleString('en-US');
                // Ensure max 2 decimal places in display for this demo, though logic below restricts input
                return parts.join('.');
            }
            
            return parseInt(val, 10).toLocaleString('en-US');
        }

        function updateDisplay() {
            display.innerText = formatAmount(currentAmount);
            
            // Simple validation logic (e.g., > 0)
            const sendBtn = document.querySelector('button.bg-secondary');
            if (parseFloat(currentAmount || "0") > 0) {
                 sendBtn.classList.remove('opacity-50', 'pointer-events-none');
            } else {
                 sendBtn.classList.add('opacity-50', 'pointer-events-none');
            }
        }

        function appendNumber(num) {
            if (currentAmount === "0") {
                currentAmount = num;
            } else {
                // Prevent more than 2 decimal places
                if (currentAmount.includes('.')) {
                    const decimals = currentAmount.split('.')[1];
                    if (decimals && decimals.length >= 2) return;
                }
                // Prevent ridiculously large numbers for demo
                if (currentAmount.replace('.','').length > 8) return;
                
                currentAmount += num;
            }
            updateDisplay();
        }

        function appendDecimal() {
            if (!currentAmount.includes('.')) {
                currentAmount += '.';
                updateDisplay();
            }
        }

        function deleteNumber() {
            if (currentAmount.length > 1) {
                currentAmount = currentAmount.slice(0, -1);
            } else {
                currentAmount = "0";
            }
            updateDisplay();
        }

        // Initialize state
        updateDisplay();
    </script>
