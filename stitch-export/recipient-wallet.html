<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Celerity - Farmer Portal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&amp;family=Geist:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-surface-variant": "#43474e",
                    "on-primary": "#ffffff",
                    "inverse-surface": "#213145",
                    "tertiary-fixed": "#dce1ff",
                    "surface-container-lowest": "#ffffff",
                    "surface-dim": "#cbdbf5",
                    "primary": "#00172e",
                    "on-tertiary-fixed-variant": "#0039b5",
                    "surface-container-high": "#dce9ff",
                    "error-container": "#ffdad6",
                    "on-secondary-fixed-variant": "#005049",
                    "on-error": "#ffffff",
                    "surface-container-highest": "#d3e4fe",
                    "on-primary-container": "#7794b9",
                    "primary-container": "#092c4c",
                    "on-primary-fixed": "#001c37",
                    "on-secondary-container": "#006f66",
                    "secondary-container": "#86f2e4",
                    "primary-fixed": "#d2e4ff",
                    "outline": "#73777f",
                    "on-secondary-fixed": "#00201d",
                    "error": "#ba1a1a",
                    "inverse-on-surface": "#eaf1ff",
                    "tertiary": "#001045",
                    "on-primary-fixed-variant": "#2b486a",
                    "surface-container": "#e5eeff",
                    "secondary": "#006a61",
                    "on-surface": "#0b1c30",
                    "surface-tint": "#446083",
                    "secondary-fixed": "#89f5e7",
                    "primary-fixed-dim": "#acc9f1",
                    "background": "#f8f9ff",
                    "tertiary-container": "#002174",
                    "on-tertiary-container": "#6b8aff",
                    "surface": "#f8f9ff",
                    "on-background": "#0b1c30",
                    "on-tertiary": "#ffffff",
                    "on-error-container": "#93000a",
                    "surface-container-low": "#eff4ff",
                    "surface-variant": "#d3e4fe",
                    "surface-bright": "#f8f9ff",
                    "outline-variant": "#c3c6cf",
                    "secondary-fixed-dim": "#6bd8cb",
                    "inverse-primary": "#acc9f1",
                    "on-tertiary-fixed": "#001551",
                    "tertiary-fixed-dim": "#b7c4ff",
                    "on-secondary": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "gutter": "16px",
                    "xl": "32px",
                    "base": "8px",
                    "lg": "24px",
                    "margin-mobile": "16px",
                    "md": "16px",
                    "sm": "8px",
                    "xs": "4px",
                    "margin-desktop": "24px"
            },
            "fontFamily": {
                    "display-lg-mobile": ["Plus Jakarta Sans"],
                    "label-caps": ["Plus Jakarta Sans"],
                    "mono-hero": ["Geist"],
                    "body-base": ["Plus Jakarta Sans"],
                    "mono-hero-mobile": ["Geist"],
                    "display-lg": ["Plus Jakarta Sans"],
                    "body-bold": ["Plus Jakarta Sans"],
                    "mono-data": ["Geist"],
                    "headline-md": ["Plus Jakarta Sans"]
            },
            "fontSize": {
                    "display-lg-mobile": ["32px", {"lineHeight": "40px", "fontWeight": "700"}],
                    "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "mono-hero": ["56px", {"lineHeight": "62px", "letterSpacing": "-0.03em", "fontWeight": "700"}],
                    "body-base": ["17px", {"lineHeight": "26px", "letterSpacing": "0", "fontWeight": "400"}],
                    "mono-hero-mobile": ["40px", {"lineHeight": "48px", "fontWeight": "700"}],
                    "display-lg": ["38px", {"lineHeight": "46px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-bold": ["17px", {"lineHeight": "26px", "letterSpacing": "0", "fontWeight": "600"}],
                    "mono-data": ["16px", {"lineHeight": "24px", "letterSpacing": "0", "fontWeight": "600"}],
                    "headline-md": ["20px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600"}]
            }
          }
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1;
        }
        .soft-shadow {
            box-shadow: 0px 4px 12px rgba(9, 44, 76, 0.08);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-base antialiased md:hidden pb-24">
<!-- Top Navigation Placeholder (Minimal for Focus) -->
<header class="w-full px-margin-mobile py-md flex items-center justify-between sticky top-0 bg-background/90 backdrop-blur-sm z-10">
<div class="flex items-center gap-xs text-primary font-body-bold">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">eco</span>
            Celerity
        </div>
<button aria-label="Help" class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-primary active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[20px]">help</span>
</button>
</header>
<main class="px-margin-mobile flex flex-col gap-lg mt-md">
<!-- Balance Card -->
<section class="bg-surface rounded-xl p-md soft-shadow border border-outline-variant flex flex-col items-center text-center relative overflow-hidden">
<div class="absolute top-0 left-0 w-full h-1 bg-secondary"></div>
<h2 class="font-label-caps text-label-caps text-on-surface-variant uppercase flex items-center gap-xs justify-center mb-xs">
                Available Balance
                <button class="text-outline p-xs rounded-full hover:bg-surface-container transition-colors" id="toggle-balance">
<span class="material-symbols-outlined text-[16px] leading-none" id="eye-icon">visibility</span>
</button>
</h2>
<div class="font-mono-hero-mobile text-mono-hero-mobile text-primary tracking-tight">
<span class="text-body-bold text-outline-variant mr-xs">₱</span><span id="balance-amount">12,500.00</span>
</div>
</section>
<!-- New Funds Banner -->
<section class="bg-surface-container-high rounded-lg p-md border border-surface-tint/20 flex gap-sm items-start">
<div class="w-10 h-10 rounded-full bg-secondary/10 flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">account_balance</span>
</div>
<div class="flex flex-col gap-xs">
<p class="font-body-bold text-body-bold text-on-surface">You received ₱25,000 from Development Bank</p>
<p class="font-body-base text-body-base text-on-surface-variant text-[14px]">Nov 3, 2023</p>
</div>
</section>
<!-- Primary Action -->
<button class="w-full h-14 bg-secondary text-on-secondary rounded-lg font-body-bold text-body-bold flex items-center justify-center gap-sm active:scale-95 transition-transform shadow-md">
<span class="material-symbols-outlined">payments</span>
            Claim ₱25,000
        </button>
<!-- History Section -->
<section class="mt-md">
<h3 class="font-headline-md text-headline-md text-primary mb-sm">Payment History</h3>
<div class="flex flex-col bg-surface rounded-xl border border-outline-variant overflow-hidden soft-shadow">
<!-- Row 1 -->
<div class="flex items-center gap-sm p-md border-b border-outline-variant active:bg-surface-container transition-colors">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-primary">receipt_long</span>
</div>
<div class="flex flex-col">
<span class="font-body-bold text-body-bold text-on-surface">Received ₱25,000</span>
<span class="font-body-base text-body-base text-on-surface-variant text-[14px]">Nov 3</span>
</div>
</div>
<!-- Row 2 -->
<div class="flex items-center gap-sm p-md active:bg-surface-container transition-colors">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-primary">receipt_long</span>
</div>
<div class="flex flex-col">
<span class="font-body-bold text-body-bold text-on-surface">Received ₱25,000</span>
<span class="font-body-base text-body-base text-on-surface-variant text-[14px]">Oct 12</span>
</div>
</div>
</div>
</section>
</main>
<!-- BottomNavBar JSON Rendered (For Mobile Only) -->
<!-- active state intent: Home -->
<nav class="fixed bottom-0 w-full rounded-t-xl shadow-sm bg-surface dark:bg-inverse-surface border-t border-outline-variant flex justify-around items-center px-4 py-3 pb-safe z-50 transition-transform duration-150">
<button class="flex flex-col items-center justify-center bg-secondary-container dark:bg-on-secondary-fixed-variant text-on-secondary-container dark:text-secondary-fixed rounded-full px-6 py-1 tap-highlight-transparent active:bg-surface-container-high transition-transform duration-150 group">
<span class="material-symbols-outlined mb-xs text-[24px]">home</span>
<span class="font-label-caps text-label-caps">Home</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline tap-highlight-transparent active:bg-surface-container-high transition-transform duration-150 group rounded-full px-6 py-1">
<span class="material-symbols-outlined mb-xs text-[24px] group-hover:text-secondary transition-colors">history</span>
<span class="font-label-caps text-label-caps group-hover:text-secondary transition-colors">Activity</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline tap-highlight-transparent active:bg-surface-container-high transition-transform duration-150 group rounded-full px-6 py-1">
<span class="material-symbols-outlined mb-xs text-[24px] group-hover:text-secondary transition-colors">person</span>
<span class="font-label-caps text-label-caps group-hover:text-secondary transition-colors">Profile</span>
</button>
</nav>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const toggleBtn = document.getElementById('toggle-balance');
            const amountSpan = document.getElementById('balance-amount');
            const eyeIcon = document.getElementById('eye-icon');
            let isVisible = true;
            const realAmount = '12,500.00';

            toggleBtn.addEventListener('click', () => {
                isVisible = !isVisible;
                if (isVisible) {
                    amountSpan.textContent = realAmount;
                    eyeIcon.textContent = 'visibility';
                } else {
                    amountSpan.textContent = '••••••';
                    eyeIcon.textContent = 'visibility_off';
                }
            });
        });
    </script>
</body></html>
